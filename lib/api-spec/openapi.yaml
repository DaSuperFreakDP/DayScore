openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: DayScore Journal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: entries
    description: Journal entries
  - name: stats
    description: User statistics
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Username taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /entries:
    get:
      operationId: listEntries
      tags: [entries]
      summary: List current user's entries
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Entry"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: createEntry
      tags: [entries]
      summary: Create today's journal entry
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntryInput"
      responses:
        "201":
          description: Entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entry"
        "400":
          description: Invalid input or entry already exists for today
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /entries/today:
    get:
      operationId: getTodayEntry
      tags: [entries]
      summary: Get today's entry for current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Today's entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entry"
        "404":
          description: No entry for today
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get current user's statistics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users:
    get:
      operationId: listUsers
      tags: [admin]
      summary: List all users (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of users with summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUserSummary"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{userId}/entries:
    get:
      operationId: getAdminUserEntries
      tags: [admin]
      summary: Get a user's score history (admin only, no text)
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User score history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminEntry"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        isAdmin:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - username
        - isAdmin
        - createdAt

    AuthInput:
      type: object
      properties:
        username:
          type: string
          minLength: 2
          maxLength: 30
        password:
          type: string
          minLength: 4
      required:
        - username
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    Entry:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        entryDate:
          type: string
          description: "YYYY-MM-DD"
        stars:
          type: integer
          minimum: 1
          maximum: 5
        goodInput1:
          type: string
        goodInput2:
          type: string
        improvementInput:
          type: ["string", "null"]
        skippedImprovement:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - userId
        - entryDate
        - stars
        - goodInput1
        - goodInput2
        - improvementInput
        - skippedImprovement
        - createdAt

    EntryInput:
      type: object
      properties:
        stars:
          type: integer
          minimum: 1
          maximum: 5
        goodInput1:
          type: string
          minLength: 1
        goodInput2:
          type: string
          minLength: 1
        improvementInput:
          type: ["string", "null"]
        skippedImprovement:
          type: boolean
      required:
        - stars
        - goodInput1
        - goodInput2
        - skippedImprovement

    Stats:
      type: object
      properties:
        currentStreak:
          type: integer
        longestStreak:
          type: integer
        totalEntries:
          type: integer
        averageStars:
          type: number
        weekAverage:
          type: ["number", "null"]
        monthAverage:
          type: ["number", "null"]
        fiveStarWeekStreak:
          type: boolean
        encouragementMessage:
          type: ["string", "null"]
      required:
        - currentStreak
        - longestStreak
        - totalEntries
        - averageStars
        - weekAverage
        - monthAverage
        - fiveStarWeekStreak
        - encouragementMessage

    AdminUserSummary:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        entryCount:
          type: integer
        lastEntryDate:
          type: ["string", "null"]
        averageStars:
          type: ["number", "null"]
      required:
        - id
        - username
        - entryCount
        - lastEntryDate
        - averageStars

    AdminEntry:
      type: object
      properties:
        id:
          type: integer
        entryDate:
          type: string
        stars:
          type: integer
        skippedImprovement:
          type: boolean
      required:
        - id
        - entryDate
        - stars
        - skippedImprovement
