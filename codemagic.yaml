workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60

    environment:
      node: 20
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm install

      - name: Generate iOS project
        script: |
          cd artifacts/journal-app
          pnpm exec expo prebuild --platform ios --non-interactive

      - name: Install CocoaPods
        script: |
          cd artifacts/journal-app/ios
          pod install

      - name: Build archive
        script: |
          cd artifacts/journal-app
          export NODE_BINARY=$(which node)

          xcodebuild \
            -workspace ios/*.xcworkspace \
            -scheme $(ls ios | grep xcodeproj | sed 's/.xcodeproj//') \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            archive \
            -archivePath ../../build/App.xcarchive

      - name: Create unsigned IPA
        script: |
          mkdir -p build/Payload
          cp -R build/App.xcarchive/Products/Applications/*.app build/Payload/
          cd build
          zip -r DayScore.ipa Payload

    artifacts:
      - build/*.ipa
